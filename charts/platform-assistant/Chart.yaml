apiVersion: v2
name: platform-assistant
description: AI-powered platform assistant for Kubernetes — ships OpenCode with MCP servers for cluster ops, ArgoCD, and RAG search
type: application
version: 0.1.0
appVersion: "0.1.0"

keywords:
  - ai
  - opencode
  - mcp
  - kubernetes
  - platform-engineering
  - argocd
  - rag

maintainers:
  - name: emdzej

dependencies:
  - name: kubernetes-mcp-server
    version: "0.1.0"
    repository: "oci://ghcr.io/containers/charts"
    alias: kubernetes-mcp

  - name: ollama
    version: "1.12.0"
    repository: "https://otwld.github.io/ollama-helm/"
    condition: ollama.enabled

  - name: ragclaw-mcp
    version: "0.1.0"
    repository: "oci://ghcr.io/emdzej/charts"
    condition: ragclaw-mcp.enabled