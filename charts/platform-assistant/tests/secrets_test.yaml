suite: Provider Secrets
templates:
  - templates/opencode-secrets.yaml
tests:
  - it: should not create any secrets by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should create Anthropic secret when apiKey is provided
    set:
      opencode.providers.anthropic.enabled: true
      opencode.providers.anthropic.apiKey: "sk-ant-test"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
        documentIndex: 0
      - equal:
          path: stringData.ANTHROPIC_API_KEY
          value: "sk-ant-test"
        documentIndex: 0

  - it: should not create Anthropic secret when existingSecret is set
    set:
      opencode.providers.anthropic.enabled: true
      opencode.providers.anthropic.existingSecret: "my-secret"
    asserts:
      - hasDocuments:
          count: 0

  - it: should create GitHub Copilot secret when apiKey is provided
    set:
      opencode.providers.githubCopilot.enabled: true
      opencode.providers.githubCopilot.apiKey: "ghu_test"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
        documentIndex: 0

  - it: should create multiple secrets when multiple providers have keys
    set:
      opencode.providers.anthropic.enabled: true
      opencode.providers.anthropic.apiKey: "sk-ant-test"
      opencode.providers.githubCopilot.enabled: true
      opencode.providers.githubCopilot.apiKey: "ghu_test"
    asserts:
      - hasDocuments:
          count: 2

  - it: should create custom provider secret
    set:
      opencode.providers.custom.enabled: true
      opencode.providers.custom.apiKey: "custom-key"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: stringData.CUSTOM_API_KEY
          value: "custom-key"
        documentIndex: 0
