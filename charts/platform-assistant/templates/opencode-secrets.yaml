{{- if and .Values.opencode.providers.anthropic.enabled .Values.opencode.providers.anthropic.apiKey (not .Values.opencode.providers.anthropic.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "platform-assistant.fullname" . }}-anthropic
  labels:
    {{- include "platform-assistant.opencode.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.opencode.providers.anthropic.apiKey | quote }}
---
{{- end }}
{{- if and .Values.opencode.providers.githubCopilot.enabled .Values.opencode.providers.githubCopilot.apiKey (not .Values.opencode.providers.githubCopilot.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "platform-assistant.fullname" . }}-github-copilot
  labels:
    {{- include "platform-assistant.opencode.labels" . | nindent 4 }}
type: Opaque
stringData:
  GITHUB_COPILOT_TOKEN: {{ .Values.opencode.providers.githubCopilot.apiKey | quote }}
---
{{- end }}
{{- if and .Values.opencode.providers.custom.enabled .Values.opencode.providers.custom.apiKey (not .Values.opencode.providers.custom.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "platform-assistant.fullname" . }}-custom
  labels:
    {{- include "platform-assistant.opencode.labels" . | nindent 4 }}
type: Opaque
stringData:
  CUSTOM_API_KEY: {{ .Values.opencode.providers.custom.apiKey | quote }}
{{- end }}