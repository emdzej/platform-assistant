apiVersion: v1
kind: Service
metadata:
  name: {{ include "platform-assistant.opencode.fullname" . }}
  labels:
    {{- include "platform-assistant.opencode.labels" . | nindent 4 }}
  {{- with .Values.opencode.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.opencode.service.type }}
  ports:
    - port: {{ .Values.opencode.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "platform-assistant.opencode.selectorLabels" . | nindent 4 }}
