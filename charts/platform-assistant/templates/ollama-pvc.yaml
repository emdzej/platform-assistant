{{- if and .Values.ollama.enabled .Values.ollama.persistence.enabled (not .Values.ollama.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "platform-assistant.ollama.fullname" . }}
  labels:
    {{- include "platform-assistant.ollama.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- range .Values.ollama.persistence.accessModes }}
    - {{ . }}
    {{- end }}
  {{- if .Values.ollama.persistence.storageClass }}
  storageClassName: {{ .Values.ollama.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.ollama.persistence.size }}
{{- end }}
