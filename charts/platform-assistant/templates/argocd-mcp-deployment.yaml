{{- if .Values.argocd.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "platform-assistant.argocd.fullname" . }}
  labels:
    {{- include "platform-assistant.argocd.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "platform-assistant.argocd.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.argocd.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "platform-assistant.argocd.selectorLabels" . | nindent 8 }}
        {{- with .Values.argocd.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      containers:
        - name: argocd-mcp
          image: "{{ .Values.argocd.image.registry }}/{{ .Values.argocd.image.repository }}:{{ .Values.argocd.image.tag }}"
          imagePullPolicy: {{ .Values.argocd.image.pullPolicy }}
          args:
            - http
            - --port
            - {{ .Values.argocd.service.port | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.argocd.service.port }}
              protocol: TCP
          env:
            - name: ARGOCD_BASE_URL
              value: {{ .Values.argocd.baseURL | quote }}
            {{- if .Values.argocd.readOnly }}
            - name: MCP_READ_ONLY
              value: "true"
            {{- end }}
            {{- if .Values.argocd.tlsInsecure }}
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            {{- end }}
            - name: ARGOCD_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "platform-assistant.argocd.secretName" . }}
                  key: {{ .Values.argocd.existingSecretKey }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          {{- with .Values.argocd.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.argocd.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.argocd.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.argocd.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}